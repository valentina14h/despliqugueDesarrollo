<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Testimonios – Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-brand"><span>Admin Portal</span><small>Foundation Management</small></div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/requests}"><i class="fa-solid fa-list-check icon"></i> Solicitudes</a></li>
            <li><a th:href="@{/admin/testimonials}" class="active"><i class="fa-solid fa-quote-right icon"></i> Testimonios</a></li>
            <li><a th:href="@{/admin/news}"><i class="fa-solid fa-newspaper icon"></i> Noticias</a></li>
        </ul>
        <a th:href="@{/admin/testimonials/new}" class="btn-sidebar-new">
            <i class="fa-solid fa-plus"></i> Nuevo Testimonio
        </a>
        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                    <span style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;color:#475569;font-weight:500;font-size:.9rem;">
                        <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                    </span>
                </button>
            </form>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
                <h1>Gestión de Testimonios</h1>
                <p>Administra los miembros de la comunidad Alianza Ecuador.</p>
            </div>
            <a th:href="@{/admin/testimonials/new}" class="btn btn-navy">
                <i class="fa-solid fa-plus"></i> Nuevo Testimonio
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="testimonials-grid">
            <div class="testimony-card" th:each="t : ${testimonials}">
                <img th:src="${t.photoUrl}" th:alt="${t.name}" class="testimony-avatar"
                     onerror="this.src='https://ui-avatars.com/api/?name=A+E&background=0d1f4e&color=fff'">
                <p class="testimony-name" th:text="${t.name}">Nombre</p>
                <p style="color:#94a3b8;font-size:.8rem;margin-bottom:.75rem;" th:text="${#temporals.format(t.createdAt,'dd MMM yyyy')}">Fecha</p>
                <div class="testimony-social" style="margin-bottom:1rem;">
                    <a th:if="${t.instagramUrl}" th:href="${t.instagramUrl}" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a th:if="${t.facebookUrl}" th:href="${t.facebookUrl}" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <form th:action="@{/admin/testimonials/delete/{id}(id=${t.id})}" method="post" onsubmit="return confirm('¿Eliminar este testimonio?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger" style="width:100%;">
                        <i class="fa-solid fa-trash"></i> Eliminar
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(testimonials)}" style="text-align:center;padding:4rem;color:#94a3b8;">
            <i class="fa-regular fa-user" style="font-size:2.5rem;margin-bottom:1rem;display:block;"></i>
            No hay testimonios registrados.
        </div>
    </main>
</div>
</body>
</html>
