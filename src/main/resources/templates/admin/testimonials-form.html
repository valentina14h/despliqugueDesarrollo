<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Testimonio – Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-brand"><span>Admin Portal</span><small>Foundation Management</small></div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/requests}"><i class="fa-solid fa-list-check icon"></i> Solicitudes</a></li>
            <li><a th:href="@{/admin/testimonials}" class="active"><i class="fa-solid fa-quote-right icon"></i> Testimonios</a></li>
            <li><a th:href="@{/admin/news}"><i class="fa-solid fa-newspaper icon"></i> Noticias</a></li>
        </ul>
        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                    <span style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;color:#475569;font-weight:500;font-size:.9rem;">
                        <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                    </span>
                </button>
            </form>
        </div>
    </aside>
    <main class="admin-main">
        <div class="admin-header">
            <a th:href="@{/admin/testimonials}" style="color:#94a3b8;font-size:.9rem;margin-bottom:.5rem;display:inline-block;">
                <i class="fa-solid fa-arrow-left"></i> Volver a Testimonios
            </a>
            <h1>Nuevo Testimonio</h1>
        </div>
        <div class="form-card">
            <form th:action="@{/admin/testimonials/new}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" name="name" class="form-control" placeholder="Nombre completo" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>URL de foto *</label>
                    <input type="url" name="imageUrl" class="form-control" placeholder="https://..." required maxlength="255">
                </div>
                <div class="form-group">
                    <label>Instagram URL</label>
                    <input type="url" name="instagramUrl" class="form-control" placeholder="https://instagram.com/usuario">
                </div>
                <div class="form-group">
                    <label>Facebook URL</label>
                    <input type="url" name="facebookUrl" class="form-control" placeholder="https://facebook.com/usuario">
                </div>
                <div style="display:flex;gap:1rem;margin-top:.5rem;">
                    <button type="submit" class="btn btn-navy"><i class="fa-solid fa-save"></i> Crear Testimonio</button>
                    <a th:href="@{/admin/testimonials}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
