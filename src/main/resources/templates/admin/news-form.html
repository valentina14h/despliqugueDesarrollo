<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${news != null} ? 'Editar Noticia' : 'Nueva Noticia'">Noticia – Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-brand"><span>Admin Portal</span><small>Foundation Management</small></div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/requests}"><i class="fa-solid fa-list-check icon"></i> Solicitudes</a></li>
            <li><a th:href="@{/admin/testimonials}"><i class="fa-solid fa-quote-right icon"></i> Testimonios</a></li>
            <li><a th:href="@{/admin/news}" class="active"><i class="fa-solid fa-newspaper icon"></i> Noticias</a></li>
        </ul>
        <div class="sidebar-bottom">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                    <span style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;color:#475569;font-weight:500;font-size:.9rem;">
                        <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                    </span>
                </button>
            </form>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <a th:href="@{/admin/news}" style="color:#94a3b8;font-size:.9rem;margin-bottom:.5rem;display:inline-block;">
                <i class="fa-solid fa-arrow-left"></i> Volver a Noticias
            </a>
            <h1 th:text="${news != null} ? 'Editar Noticia' : 'Nueva Noticia'">Noticia</h1>
        </div>

        <div class="form-card">
            <form th:action="${news != null} ? @{/admin/news/edit/{id}(id=${news.id})} : @{/admin/news/new}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" name="title" class="form-control"
                           th:value="${news != null} ? ${news.title} : ''"
                           placeholder="Título de la noticia" required maxlength="150">
                </div>
                <div class="form-group">
                    <label>Resumen *</label>
                    <textarea name="summary" class="form-control" rows="2"
                              placeholder="Breve resumen de la noticia..." required maxlength="300"
                              th:text="${news != null} ? ${news.summary} : ''"></textarea>
                </div>
                <div class="form-group">
                    <label>Contenido *</label>
                    <textarea name="content" class="form-control" rows="6"
                              placeholder="Contenido completo de la noticia..." required
                              th:text="${news != null} ? ${news.content} : ''"></textarea>
                </div>
                <div class="form-group">
                    <label>URL de imagen</label>
                    <input type="url" name="imageUrl" class="form-control"
                           th:value="${news != null} ? ${news.imageUrl} : ''"
                           placeholder="https://...">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="form-group">
                        <label>Autor *</label>
                        <input type="text" name="author" class="form-control"
                               th:value="${news != null} ? ${news.author} : ''"
                               placeholder="Nombre del autor" required maxlength="100">
                    </div>
                    <div class="form-group">
                        <label>Estado *</label>
                        <select name="state" class="form-control" required>
                            <option th:each="s : ${states}"
                                    th:value="${s}"
                                    th:text="${s.visualName}"
                                    th:selected="${news != null and news.state == s}">Estado</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;gap:1rem;margin-top:.5rem;">
                    <button type="submit" class="btn btn-navy">
                        <i class="fa-solid fa-save"></i>
                        <span th:text="${news != null} ? 'Actualizar Noticia' : 'Crear Noticia'">Guardar</span>
                    </button>
                    <a th:href="@{/admin/news}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
