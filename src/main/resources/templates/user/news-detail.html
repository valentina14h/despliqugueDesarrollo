<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${news.title} + ' – Ecuador Comparte'">Noticia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">
        <img src="/other/imgs/logo-ecuador.png" alt="Logo Ecuador Comparte" class="logo-img">
    </a>
    <ul class="navbar-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/news}" class="active">Noticias</a></li>
    </ul>
</nav>

<section class="section">
    <div class="container" style="max-width:780px;">
        <a th:href="@{/news}" style="color:#94a3b8;font-size:.9rem;margin-bottom:1.5rem;display:inline-block;">
            <i class="fa-solid fa-arrow-left"></i> Volver a Noticias
        </a>
        <img th:src="${news.imageUrl}" th:alt="${news.title}"
             onerror="this.src='https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=800'"
             style="width:100%;height:380px;object-fit:cover;border-radius:20px;margin-bottom:2rem;">
        <span class="card-tag">Publicado</span>
        <h1 style="font-size:2rem;font-weight:800;color:#0d1f4e;margin:1rem 0;" th:text="${news.title}">Título</h1>
        <div style="display:flex;align-items:center;gap:1rem;color:#94a3b8;font-size:.88rem;margin-bottom:2rem;">
            <span><i class="fa-solid fa-user"></i> <span th:text="${news.author}">Autor</span></span>
            <span><i class="fa-solid fa-calendar"></i> <span th:text="${#temporals.format(news.publicationDate,'dd MMMM yyyy')}">Fecha</span></span>
        </div>
        <p style="color:#475569;line-height:1.85;font-size:1.05rem;" th:text="${news.content}">Contenido</p>
    </div>
</section>

<footer>
    <div class="footer-bottom">© 2024 FUNDACIÓN ECUADOR COMPARTE · RESILIENCIA &amp; ESPERANZA.</div>
</footer>
</body>
</html>
